{% extends "base.html" %}
{% block contenido %}
<section class="pantalla-movil" style="padding-top:2rem;">
    <div class="centrado" style="margin-bottom:1.5rem;">
        <div style="display:inline-flex;align-items:center;justify-content:center;width:100px;height:100px;margin-bottom:0.8rem;">
            <img src="/static/img/splash.svg?v=2024" alt="FonoApp" style="width:100%;height:auto;filter:drop-shadow(0 4px 16px rgba(211,47,47,0.3));" />
        </div>
        <h1 class="titulo-rojo" style="margin:0;font-size:1.5rem;">Crear cuenta</h1>
        <p class="texto-pequeño" style="margin-top:0.3rem;">Únete a FonoApp</p>
    </div>
    {% if error %}<div class="mensaje-error">⚠️ {{ error }}</div>{% endif %}
    <form method="post" action="/auth/registro" class="formulario-movil">
        <label class="etiqueta-campo" for="nombre">Nombre completo</label>
        <input type="text" id="nombre" name="nombre" class="campo-texto" placeholder="Nombre y apellido" value="{{ nombre or '' }}" autocomplete="name" required />
        <label class="etiqueta-campo" for="email">Correo electrónico</label>
        <input type="email" id="email" name="email" class="campo-texto" placeholder="tu@correo.com" value="{{ email or '' }}" autocomplete="email" required />
        <label class="etiqueta-campo" for="password">Contraseña</label>
        <input type="password" id="password" name="password" class="campo-texto" placeholder="Mínimo 6 caracteres" autocomplete="new-password" required />
        <div class="grupo-checkbox" style="margin-top:0.5rem;">
            <input type="checkbox" id="acepta_terminos" name="acepta_terminos" value="true" required />
            <label for="acepta_terminos" style="font-size:0.88rem;">Acepto los <a href="#" class="link-rojo">términos y condiciones</a></label>
        </div>
        <button type="submit" class="boton-rojo ancho-completo" style="margin-top:1.2rem;padding:0.85rem;font-size:1rem;">Crear cuenta →</button>
        <div style="text-align:center;margin-top:0.8rem;">
            <span class="texto-pequeño">¿Ya tienes cuenta?</span>
            <a href="/auth/login" class="link-rojo" style="font-size:0.88rem;margin-left:0.3rem;">Inicia sesión</a>
        </div>
    </form>
</section>
{% endblock %}
