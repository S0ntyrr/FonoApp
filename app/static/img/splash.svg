<?xml version="1.0" encoding="UTF-8"?>
<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <radialGradient id="grad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ff3333"/>
      <stop offset="100%" stop-color="#cc0000"/>
    </radialGradient>

    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="4"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fondo Transparente -->
  <rect width="100%" height="100%" fill="transparent"/>

  <!-- Círculo con Sombra -->
  <circle cx="150" cy="140" r="80" fill="url(#grad)" filter="url(#dropShadow)">
    <animate attributeName="r" values="79;81;79" dur="2s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
  </circle>

  <!-- Ondas de sonido (emanando del centro) -->
  <g fill="none" stroke="white" stroke-opacity="0.7">
    <circle cx="150" cy="140" r="20">
      <animate attributeName="r" values="20;70" dur="1.8s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="stroke-opacity" values="0.7;0" dur="1.8s" begin="0s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="140" r="20">
      <animate attributeName="r" values="20;70" dur="1.8s" begin="0.9s" repeatCount="indefinite"/>
      <animate attributeName="stroke-opacity" values="0.7;0" dur="1.8s" begin="0.9s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Micrófono refinado y animado con el círculo -->
  <g transform="translate(150, 135)">
    <g>
      <animateTransform attributeName="transform" type="scale" values="0.98;1.02;0.98" dur="2s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
      <g fill="white" transform="translate(-150, -140)">
        <!-- Cápsula -->
        <rect x="138" y="105" width="24" height="45" rx="12"/>
        <!-- Soporte -->
        <path d="M130 145 Q150 165 170 145" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
        <!-- Base -->
        <line x1="150" y1="165" x2="150" y2="180" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
        <line x1="138" y1="180" x2="162" y2="180" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
      </g>
    </g>
  </g>

  <!-- Texto -->
  <text x="150" y="255" text-anchor="middle" font-family="'Poppins', sans-serif" font-size="24" font-weight="700" fill="#d32f2f">
    FonoApp
  </text>
  <text x="150" y="275" text-anchor="middle" font-family="'Poppins', sans-serif" font-size="12" fill="#cc0000">
    Terapia Interactiva
  </text>

</svg>
